services:
  pg-cse-511-assign-4:
    image: veedata/cse511-assignment4
    container_name: pg-cse-511-assign-4
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    command: bash -c "service postgresql start && tail -f /dev/null"
    volumes:
      - ./cse511:/root/cse511
      - ./pgdata:/var/lib/postgresql/data